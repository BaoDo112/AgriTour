version: 0.2

phases:
  pre_build:
    commands:
      - echo Validating required build variables...
      - test -n "$AWS_ACCOUNT_ID"
      - test -n "$AWS_DEFAULT_REGION"
      - test -n "$IMAGE_REPO_NAME"
      - test -n "$CONTAINER_NAME"
      - test -n "$SERVICE_PATH"
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
      - REPOSITORY_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME"
      - COMMIT_HASH="${CODEBUILD_RESOLVED_SOURCE_VERSION:=manual-build}"
      - IMAGE_TAG="$(echo "$COMMIT_HASH" | cut -c 1-7)"
  build:
    commands:
      - echo Building Docker image for $SERVICE_PATH...
      - docker build -t "$IMAGE_REPO_NAME:$IMAGE_TAG" -f "$SERVICE_PATH/Dockerfile" "$SERVICE_PATH"
      - docker tag "$IMAGE_REPO_NAME:$IMAGE_TAG" "$REPOSITORY_URI:$IMAGE_TAG"
      - docker tag "$IMAGE_REPO_NAME:$IMAGE_TAG" "$REPOSITORY_URI:latest"
  post_build:
    commands:
      - echo Pushing Docker images...
      - docker push "$REPOSITORY_URI:$IMAGE_TAG"
      - docker push "$REPOSITORY_URI:latest"
      - printf '[{"name":"%s","imageUri":"%s"}]' "$CONTAINER_NAME" "$REPOSITORY_URI:$IMAGE_TAG" > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json